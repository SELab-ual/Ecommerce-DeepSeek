<svg width="300" height="400" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="300" height="400" fill="#F5F5F5"/>
    
    <!-- Book cover border -->
    <rect x="10" y="10" width="280" height="380" rx="8" fill="white" stroke="#E0E0E0" stroke-width="2"/>
    
    <!-- Book spine effect -->
    <rect x="10" y="10" width="40" height="380" fill="#F0F0F0" rx="4"/>
    <line x1="30" y1="10" x2="30" y2="390" stroke="#D0D0D0" stroke-width="1" stroke-dasharray="4 4"/>
    
    <!-- Decorative pattern -->
    <circle cx="150" cy="150" r="60" fill="#E6F0FA" stroke="#0066CC" stroke-width="2" stroke-dasharray="8 8"/>
    
    <!-- Book icon -->
    <path d="M120 180 L180 180 L180 260 L150 280 L120 260 Z" fill="#0066CC" opacity="0.1"/>
    <rect x="130" y="190" width="40" height="60" fill="#0066CC" opacity="0.2" rx="2"/>
    
    <!-- Lines representing text -->
    <line x1="120" y1="220" x2="170" y2="220" stroke="#0066CC" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="120" y1="230" x2="160" y2="230" stroke="#0066CC" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    <line x1="120" y1="240" x2="150" y2="240" stroke="#0066CC" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
    
    <!-- "No Cover" text -->
    <text x="150" y="320" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#999999" text-anchor="middle">NO COVER</text>
    <text x="150" y="340" font-family="Arial, sans-serif" font-size="12" fill="#CCCCCC" text-anchor="middle">Placeholder Image</text>
    
    <!-- Sprint Shop branding -->
    <text x="150" y="370" font-family="Arial, sans-serif" font-size="10" fill="#DDDDDD" text-anchor="middle">Sprint Shop v1</text>
</svg>